<header class="sticky top-0 z-50 bg-[#0b0f19]/80 backdrop-blur-xl border-b border-gray-800/40 transition-all duration-300">
  <nav class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <div class="flex-shrink-0 flex items-center gap-3 group cursor-pointer">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/10 transform group-hover:scale-105 transition-transform duration-300">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="text-lg font-bold tracking-tight text-white transition-colors duration-200">
          Brand<span class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Name</span>
        </span>
      </div>

      <ul class="hidden lg:flex items-center gap-1">
        <li>
          <a href="" class="text-sm font-semibold text-indigo-400 bg-indigo-500/10 px-4 py-2 rounded-xl block tracking-wide transition-all duration-200">
            Feed
          </a>
        </li>
        <li>
          <a href="" class="text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 px-4 py-2 rounded-xl block transition-all duration-200 tracking-wide">
            Explore
          </a>
        </li>
        <li>
          <a href="" class="text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 px-4 py-2 rounded-xl block transition-all duration-200 tracking-wide">
            Trending
          </a>
        </li>
        <li>
          <a href="" class="text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 px-4 py-2 rounded-xl block transition-all duration-200 tracking-wide">
            Bookmarks
          </a>
        </li>
      </ul>

      <ul class="hidden lg:flex items-center gap-4">
        <li>
          <a href="" class="text-sm font-semibold text-slate-400 hover:text-white px-4 py-2 rounded-xl transition-colors duration-200">
            Login
          </a>
        </li>
        <li>
          <a href="" class="inline-flex items-center justify-center text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-500 shadow-md shadow-indigo-600/10 px-5 py-2.5 rounded-xl transition-all duration-200 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-indigo-500/40">
            Sign Up
          </a>
        </li>
      </ul>

      <button type="button" (click)="toggle()" class="lg:hidden inline-flex items-center justify-center p-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800/60 transition-all duration-200 focus:outline-none" aria-label="Toggle menu">
        @if(!isOpenMenu()){
          <svg class="h-6 w-6 transform transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        }@else {
          <svg class="h-6 w-6 transform rotate-90 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        }
      </button>
    </div>

    @if(isOpenMenu()){
      <div class="lg:hidden pb-6 pt-1 transition-all duration-300 ease-in-out">
        <ul class="flex flex-col gap-1 p-2 bg-[#0f1422] rounded-2xl border border-gray-800/60 shadow-xl">
          <li>
            <a href="" class="block px-4 py-3 text-sm font-semibold text-indigo-400 bg-indigo-500/10 rounded-xl">
              Feed
            </a>
          </li>
          <li>
            <a href="" class="block px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-800/40 hover:text-white transition-colors">
              Explore
            </a>
          </li>
          <li>
            <a href="" class="block px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-800/40 hover:text-white transition-colors">
              Trending
            </a>
          </li>
          <li>
            <a href="" class="block px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-800/40 hover:text-white transition-colors">
              Bookmarks
            </a>
          </li>
          <li class="my-1.5 border-t border-gray-800/60"></li>
          <li>
            <a href="" class="block text-center px-4 py-3 text-sm font-semibold text-slate-300 rounded-xl hover:bg-slate-800/40 hover:text-white transition-colors">
              Login
            </a>
          </li>
          <li>
            <a href="" class="block text-center text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-500 px-5 py-3 rounded-xl shadow-md shadow-indigo-600/10 transition-colors">
              Sign Up
            </a>
          </li>
        </ul>
      </div>
    }
  </nav>
</header>
