<header class="bg-gradient-to-br from-indigo-50 via-white to-white relative">
  <nav class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <div class="flex-shrink-0">
        <img src="" alt="" class="h-9 w-auto">
      </div>

      <ul class="hidden lg:flex items-center gap-9">
        <li><a href="" class="text-sm font-semibold text-gray-900">Feed</a></li>
        <li><a href="" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">Explore</a></li>
        <li><a href="" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">Trending</a></li>
        <li><a href="" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">BookMarks</a></li>
      </ul>

      <ul class="hidden lg:flex items-center gap-5">
        <li><a href="" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">Login</a></li>
        <li>
          <a href="" class="inline-block text-sm font-semibold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-5 py-2 rounded-md transition-colors">SignUp</a>
        </li>
      </ul>

      <button type="button" (click)="toggle()" class="lg:hidden inline-flex items-center justify-center p-2 rounded-md text-gray-600 hover:bg-gray-100" aria-label="Toggle menu">
      @if(!isOpenMenu()){
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>

      }@else{
         <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>

      }
    </button>
    </div>

    @if(isOpenMenu()){
        <div class="lg:hidden pb-5">
        <ul class="flex flex-col gap-1 pt-2 border-t border-gray-100">
          <li><a href="" class="block px-2 py-2.5 text-sm font-semibold text-gray-900 rounded-md hover:bg-gray-50">Feed</a></li>
          <li><a href="" class="block px-2 py-2.5 text-sm font-medium text-gray-600 rounded-md hover:bg-gray-50">Explore</a></li>
          <li><a href="" class="block px-2 py-2.5 text-sm font-medium text-gray-600 rounded-md hover:bg-gray-50">Trending</a></li>
          <li><a href="" class="block px-2 py-2.5 text-sm font-medium text-gray-600 rounded-md hover:bg-gray-50">BookMarks</a></li>
          <li class="pt-2 mt-2 border-t border-gray-100"><a href="" class="block px-2 py-2.5 text-sm font-medium text-gray-600 rounded-md hover:bg-gray-50">Login</a></li>
          <li><a href="" class="block mx-2 mt-1 text-center text-sm font-semibold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-5 py-2.5 rounded-md">SignUp</a></li>
        </ul>
      </div>
    }
    </nav>
</header>
